# Product metadata - the single source of truth
#
# This file is shell-sourceable (KEY="value") and is also parsed by the kernel
# build script (src/kernel/build.rs), which exposes each entry as a compile-time
# environment variable (PRODUCT_NAME, PRODUCT_VERSION, ...). Do not duplicate
# these values anywhere else - load them from here.

PRODUCT_NAME="LiberSystem"
PRODUCT_VERSION="0.0.1"
PRODUCT_WEBSITE="https://libersystem.com"
PRODUCT_GITHUB="https://github.com/libersoft-org/libersystem"
PRODUCT_VENDOR="LiberSoft"
PRODUCT_VENDOR_URL="https://libersoft.org"
