# Product metadata - the single source of truth
#
# This file is shell-sourceable (KEY="value") and is also parsed by the kernel
# build script (src/kernel/build.rs), which exposes each entry as a compile-time
# environment variable (PRODUCT_NAME, PRODUCT_VERSION, ...). It also holds the
# boot artifact (boot module) filenames. Do not duplicate any of these values
# anywhere else - load them from here.

PRODUCT_NAME="LiberSystem"
PRODUCT_VERSION="0.0.1"
PRODUCT_WEBSITE="https://libersystem.com"
PRODUCT_GITHUB="https://github.com/libersoft-org/libersystem"
PRODUCT_VENDOR="LiberSoft"
PRODUCT_VENDOR_URL="https://libersoft.org"

# Boot artifact (boot module) filenames - the single source of truth. Consumed
# by build.rs (writes the packages + exports these names to the kernel so it can
# locate the modules) and boot/mkimage.sh (stages them onto the FAT boot
# filesystem next to the loader, where the own UEFI loader reads them by name).
INIT_PACKAGE="init.pkg"
VOLUME_PACKAGE="volume.pkg"
