[package]
name = "volume-client-provider"
edition = "2024"
description = "ELF trampoline provider for concrete LiberSystem volume channel clients"

[lib]
path = "src/lib.rs"

[features]
default = []
shared-image = ["rt/shared-image", "storage-proto/shared-image"]

[dependencies]
base-proto = { path = "../base-proto" }
rt = { path = "../rt" }
storage-proto = { path = "../storage-proto" }
wire = { path = "../../wire" }
