[features]
default = []
shared-image = ["ipc-client/shared-image", "audio-client/shared-image", "dep:audio-client-provider", "config-client/shared-image", "dep:config-client-provider", "device-client/shared-image", "dep:device-client-provider", "log-client/shared-image", "dep:log-client-provider", "network-client/shared-image", "dep:network-client-provider", "observability-client/shared-image", "dep:observability-client-provider", "process-client/shared-image", "process-client-provider/shared-image", "resources-client/shared-image", "dep:resources-client-provider", "security-client/shared-image", "dep:security-client-provider", "time-client/shared-image", "dep:time-client-provider", "volume-client/shared-image", "volume-client-provider/shared-image", "proto/shared-image", "rt/shared-image"]

[dependencies]
ipc-client = { path = "../ipc-client" }
# Shared ring-3 userspace runtime (entry stub, syscall wrapper, panic handler, and
# the syscall/IPC helpers); it re-exports the abi constants.
rt = { path = "../rt" }

# Generated LSIDL bindings: the net tools speak the NetworkService contracts
# (`network` / `socket`) via the proto codec + generated clients.
proto = { path = "../../proto" }
audio-client = { path = "../audio-client", optional = true }
audio-client-provider = { path = "../audio-client-provider", optional = true }
network-client = { path = "../network-client", optional = true }
network-client-provider = { path = "../network-client-provider", optional = true }
config-client = { path = "../config-client", optional = true }
config-client-provider = { path = "../config-client-provider", optional = true }
device-client = { path = "../device-client", optional = true }
device-client-provider = { path = "../device-client-provider", optional = true }
log-client = { path = "../log-client", optional = true }
log-client-provider = { path = "../log-client-provider", optional = true }
observability-client = { path = "../observability-client", optional = true }
observability-client-provider = { path = "../observability-client-provider", optional = true }
process-client = { path = "../process-client", optional = true }
process-client-provider = { path = "../process-client-provider", optional = true }
resources-client = { path = "../resources-client", optional = true }
resources-client-provider = { path = "../resources-client-provider", optional = true }
security-client = { path = "../security-client", optional = true }
security-client-provider = { path = "../security-client-provider", optional = true }
time-client = { path = "../time-client", optional = true }
time-client-provider = { path = "../time-client-provider", optional = true }
volume-client = { path = "../volume-client", optional = true }
volume-client-provider = { path = "../volume-client-provider", optional = true }

bmp = { path = "../bmp" }
keys = { path = "../keys" }
imgconv = { path = "../imgconv" }
pix = { path = "../pix" }
png = { path = "../png" }
surface = { path = "../surface" }
