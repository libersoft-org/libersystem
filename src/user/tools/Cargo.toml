[package]
name = "tools"
# The product version lives only in /product.conf; Cargo's optional package version
# is unused here and omitted. The tools crate produces the standalone foreground
# programs the shell spawns (the Unix small-tools split) - loaded from the init
# package, run as separate processes, and waited on by the shell.
edition = "2024"
build = "../build.rs"
description = "Standalone foreground tools the shell spawns"

[[bin]]
name = "echo"
path = "src/echo.rs"

[[bin]]
name = "date"
path = "src/date.rs"

[[bin]]
name = "cat"
path = "src/cat.rs"

[[bin]]
name = "write"
path = "src/write.rs"

[[bin]]
name = "rm"
path = "src/rm.rs"

[[bin]]
name = "ls"
path = "src/ls.rs"

[[bin]]
name = "mkdir"
path = "src/mkdir.rs"

[[bin]]
name = "rmdir"
path = "src/rmdir.rs"

[[bin]]
name = "log"
path = "src/log.rs"

[[bin]]
name = "snap"
path = "src/snap.rs"

[[bin]]
name = "lsdev"
path = "src/lsdev.rs"

[[bin]]
name = "config"
path = "src/config.rs"

[[bin]]
name = "set"
path = "src/set.rs"

[[bin]]
name = "beep"
path = "src/beep.rs"

[[bin]]
name = "usage"
path = "src/usage.rs"

[[bin]]
name = "ps"
path = "src/ps.rs"

[[bin]]
name = "run"
path = "src/run.rs"

[[bin]]
name = "perm"
path = "src/perm.rs"

[[bin]]
name = "stop"
path = "src/stop.rs"

[[bin]]
name = "lsvol"
path = "src/lsvol.rs"

[[bin]]
name = "uname"
path = "src/uname.rs"

[[bin]]
name = "uptime"
path = "src/uptime.rs"

[[bin]]
name = "dmesg"
path = "src/dmesg.rs"

[[bin]]
name = "lscpu"
path = "src/lscpu.rs"

[[bin]]
name = "free"
path = "src/free.rs"

[[bin]]
name = "lsmem"
path = "src/lsmem.rs"

[[bin]]
name = "lsirq"
path = "src/lsirq.rs"

[[bin]]
name = "lspci"
path = "src/lspci.rs"

[[bin]]
name = "lssvc"
path = "src/lssvc.rs"

[[bin]]
name = "lsblk"
path = "src/lsblk.rs"

[[bin]]
name = "lsusb"
path = "src/lsusb.rs"

[[bin]]
name = "ping"
path = "src/ping.rs"

[[bin]]
name = "ip"
path = "src/ip.rs"

[[bin]]
name = "nslookup"
path = "src/nslookup.rs"

[[bin]]
name = "tcp"
path = "src/tcp.rs"

[[bin]]
name = "nc"
path = "src/nc.rs"

[[bin]]
name = "arp"
path = "src/arp.rs"

[[bin]]
name = "httpd"
path = "src/httpd.rs"

[[bin]]
name = "ss"
path = "src/ss.rs"

[[bin]]
name = "script"
path = "src/script.rs"

[[bin]]
name = "ptyecho"
path = "src/ptyecho.rs"

[[bin]]
name = "readln"
path = "src/readln.rs"

[dependencies]
# Shared ring-3 userspace runtime (entry stub, syscall wrapper, panic handler, and
# the syscall/IPC helpers); it re-exports the abi constants.
rt = { path = "../rt" }

# Generated LSIDL bindings: the net tools speak the NetworkService contracts
# (`network` / `socket`) via the proto codec + generated clients.
proto = { path = "../../proto" }

# Note: the x86_64-unknown-none target is panic-strategy = "abort" by default, so we
# do not set `panic = "abort"` per-profile (same reasoning as the kernel).
