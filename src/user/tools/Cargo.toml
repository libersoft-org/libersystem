[package]
name = "tools"
# The product version lives only in /product.conf; Cargo's optional package version
# is unused here and omitted. The tools crate produces the standalone foreground
# programs the shell spawns (the Unix small-tools split) - loaded from the init
# package, run as separate processes, and waited on by the shell.
edition = "2024"
build = "../build.rs"
description = "Standalone foreground tools the shell spawns"

# MP3 synthesis is a sustained playback hot path. Optimize only this package pair;
# x86 hardware float is selected by the shared userspace target configuration.
[profile.dev.package.mp3]
opt-level = 3

[profile.dev.package.nanomp3]
opt-level = 3

# The helpers the tools share (trimming, tokenizing, decimal/port parsing, decimal
# formatting, and the receive-and-parse-a-JsonMode handshake). Each bin pulls them in
# with `use tools::*`, so the parsing and formatting cannot drift between tools.
[lib]
name = "tools"
path = "src/lib.rs"

[[bin]]
name = "echo"
path = "src/echo.rs"

[[bin]]
name = "date"
path = "src/date.rs"

[[bin]]
name = "cat"
path = "src/cat.rs"

[[bin]]
name = "write"
