[build]
target = "x86_64-unknown-none.json"
target-dir = "../../.build/cargo/user"

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true

[target.x86_64-unknown-none]
# Force a non-PIE, fixed-address ET_EXEC: the kernel's minimal ELF loader maps
# segments at their link-time p_vaddr and applies no relocations, so the program
# must use absolute addressing rather than a position-independent layout. The
# kernel eagerly preserves x87/SSE state; the custom target selects the mandatory
# x86_64 SSE2 hard-float ABI instead of the built-in target's soft-float ABI.
rustflags = ["-C", "relocation-model=static"]

[target.aarch64-unknown-none]
# Same fixed-address ET_EXEC contract as x86_64: the kernel ELF loader maps
# segments at their link-time p_vaddr with no relocations. Build for aarch64 with
# `cargo build --target aarch64-unknown-none` (overriding the default target).
rustflags = ["-C", "relocation-model=static"]

[target.riscv64gc-unknown-none-elf]
# Same fixed-address ET_EXEC contract as x86_64/aarch64: the kernel ELF loader maps
# segments at their link-time p_vaddr with no relocations. code-model=medium (RISC-V
# "medany") keeps the absolute addressing within the low-half link base. Build with
# `cargo build --target riscv64gc-unknown-none-elf`.
rustflags = ["-C", "relocation-model=static", "-C", "code-model=medium"]
